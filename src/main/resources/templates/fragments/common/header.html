<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Header Fragment</title>
</head>
<body>
<header th:fragment="header" class="header">
    <a sec:authorize="!hasAnyRole('ADMIN', 'OWNER')"
       th:href="@{/}"
       class="logo">
        <img src="/images/skull-logo.png" alt="Shrooms logo">

        <div class="logo-text">
            <div class="logo-title">SHROOMS</div>
            <div class="logo-subtitle">SCAFFOLD SOLUTIONS</div>
        </div>
    </a>

    <a sec:authorize="hasRole('ADMIN')"
       th:href="@{/admin}"
       class="logo">
        <img src="/images/skull-logo.png" alt="Shrooms logo">

        <div class="logo-text">
            <div class="logo-title">SHROOMS</div>
            <div class="logo-subtitle">SCAFFOLD SOLUTIONS</div>
        </div>
    </a>

    <a sec:authorize="hasRole('OWNER')"
       th:href="@{/owner}"
       class="logo">
        <img src="/images/skull-logo.png" alt="Shrooms logo">

        <div class="logo-text">
            <div class="logo-title">SHROOMS</div>
            <div class="logo-subtitle">SCAFFOLD SOLUTIONS</div>
        </div>
    </a>

    <nav class="nav">
        <a sec:authorize="!hasAnyRole('ADMIN', 'OWNER')"
           th:href="@{/}">
            Home
        </a>

        <a sec:authorize="hasRole('ADMIN')"
           th:href="@{/admin}">
            Home
        </a>

        <a sec:authorize="hasRole('OWNER')"
           th:href="@{/owner}">
            Home
        </a>

        <a sec:authorize="hasRole('OWNER')"
           th:href="@{/owner/our-work}">
            Our Work
        </a>

        <a sec:authorize="!hasRole('OWNER')"
           th:href="@{/our-work}">
            Our Work
        </a>

        <a sec:authorize="isAnonymous()" th:href="@{/login}">Login</a>
        <a sec:authorize="isAnonymous()" th:href="@{/register}" class="register-btn">Register</a>

        <a sec:authorize="hasRole('USER')"
           th:href="@{/orders}">
            My Orders
        </a>

        <a sec:authorize="hasAnyRole('ADMIN', 'OWNER')"
           th:href="@{/admin/orders}">
            Orders
        </a>

        <a sec:authorize="hasAnyRole('ADMIN', 'OWNER')"
           th:href="@{/admin/custom-orders}">
            Custom Requests
        </a>

        <a sec:authorize="hasAnyRole('ADMIN', 'OWNER')"
           th:href="@{/admin/inspections}">
            Inspections
        </a>

        <a sec:authorize="hasRole('OWNER')"
           th:href="@{/admin/scaffolds}">
            Scaffolds
        </a>

        <a sec:authorize="hasRole('OWNER')"
           th:href="@{/owner/users}">
            Users
        </a>

        <a sec:authorize="isAuthenticated()" th:href="@{/users/profile}">Profile</a>
        <a sec:authorize="isAuthenticated()" th:href="@{/logout}" class="logout-btn">Logout</a>
    </nav>
</header>
</body>
</html>
