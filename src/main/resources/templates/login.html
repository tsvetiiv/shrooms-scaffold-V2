<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Login | Shrooms</title>
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/login.css">
</head>
<body>

<div th:insert="~{fragments/common/header :: header}"></div>

<main class="login-page">
  <section class="login-card">
    <h1>Login</h1>
    <p>Access your scaffold orders and custom requests.</p>

    <form th:action="@{/login}" th:method="post" th:object="${userLoginData}">

      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" th:field="*{username}" id="username">
        <p class="error"
           th:if="${#fields.hasErrors('username')}"
           th:errors="*{username}">
        </p>
        <p class="error"
           th:if="${loginError}"
           th:text="${loginError}">
        </p>
      </div>

      <div class="form-group">
        <label for="password">Password</label>

        <input type="password" th:field="*{password}" id="password">
        <p class="error"
           th:if="${#fields.hasErrors('password')}"
           th:errors="*{password}">
        </p>
      </div>

      <button type="submit">
        Login
      </button>

    </form>
  </section>
</main>
<div th:insert="~{fragments/common/footer :: footer}"></div>
</body>
</html>
