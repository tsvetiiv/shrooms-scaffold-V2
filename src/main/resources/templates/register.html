<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register | Shrooms</title>
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/register.css">
</head>
<body>

<div th:insert="~{fragments/common/header :: header}"></div>

<main class="register-page">
    <section class="register-card">
        <h1>Create Account</h1>
        <p>Join Shrooms and request scaffold services easily.</p>

        <form th:action="@{/register}" th:method="post" th:object="${userRegisterRequest}">

            <div class="form-group">
                <label for="username">Username</label>
                <input id="username" type="text" th:field="*{username}" placeholder="Enter username">
                <small th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></small>
            </div>
            <div class="form-group">
                <label for="firstName">First name</label>
                <input id="firstName" type="text" th:field="*{firstName}" placeholder="Enter your first name">
                <small th:if="${#fields.hasErrors('firstName')}"
                       th:errors="*{firstName}">
                </small>
            </div>

            <div class="form-group">
                <label for="lastName">Last name</label>
                <input id="lastName" type="text" th:field="*{lastName}" placeholder="Enter your last name">
                <small th:if="${#fields.hasErrors('lastName')}"
                       th:errors="*{lastName}">
                </small>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input id="email" type="email" th:field="*{email}" placeholder="Enter your email">
                <small th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></small>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" type="password" th:field="*{password}" placeholder="Enter password">
                <small th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></small>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input id="confirmPassword"
                       type="password"
                       th:field="*{confirmPassword}"
                       placeholder="Confirm password">
                <small th:if="${#fields.hasErrors('confirmPassword')}"
                       th:errors="*{confirmPassword}">
                </small>

                <small th:if="${passwordError}"
                       th:text="${passwordError}">
                </small>
            </div>

            <button type="submit">Register</button>
        </form>
    </section>
</main>

<div th:insert="~{fragments/common/footer :: footer}"></div>

</body>
</html>
