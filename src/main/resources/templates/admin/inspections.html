<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Admin Inspections | Shrooms</title>
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/admin-orders.css">
</head>
<body>

<div th:insert="~{fragments/common/header :: header}"></div>

<main class="admin-orders-page">
    <section class="admin-orders-panel">

        <div class="admin-page-heading">
            <h1>Inspections</h1>
            <a sec:authorize="hasRole('ADMIN')"
               th:href="@{/admin}" class="back-admin-link">Back to Dashboard</a>
            <a sec:authorize="hasRole('OWNER')"
               th:href="@{/owner}" class="back-admin-link">Back to Dashboard</a>
        </div>

        <div class="red-line"></div>

        <div class="flash-message success"
             th:if="${successMessage}"
             th:text="${successMessage}">
        </div>

        <div class="flash-message warning"
             th:if="${warningMessage}"
             th:text="${warningMessage}">
        </div>

        <div class="table-responsive">
            <table class="admin-orders-table admin-inspections-table">
                <thead>
                <tr>
                    <th>Customer</th>
                    <th>Project Type</th>
                    <th>Address</th>
                    <th>Inspection Date</th>
                    <th>Status</th>
                    <th>Risk Level</th>
                    <th>Recommended Action</th>
                    <th>Inspector</th>
                    <th>Action</th>
                </tr>
                </thead>

                <tbody>
                <tr th:if="${#lists.isEmpty(inspections)}">
                    <td colspan="9">No inspection requests yet.</td>
                </tr>

                <tr th:each="inspection : ${inspections}">
                    <td th:text="${inspection.customerName}">Customer Name</td>
                    <td th:text="${inspection.projectType}">ORDER</td>
                    <td th:text="${inspection.projectAddress}">Project address</td>
                    <td th:text="${inspection.inspectionDate != null ? #temporals.format(inspection.inspectionDate, 'dd.MM.yyyy') : '-'}">
                        14.07.2026
                    </td>
                    <td>
                        <span class="status-badge"
                              th:classappend="${inspection.status != null ? inspection.status.name().toLowerCase() : ''}"
                              th:text="${inspection.status != null ? inspection.status : '-'}">
                            REQUESTED
                        </span>
                    </td>
                    <td th:text="${inspection.riskLevel != null ? inspection.riskLevel : '-'}">LOW</td>
                    <td th:text="${inspection.recommendedAction != null ? inspection.recommendedAction : '-'}">APPROVE</td>
                    <td th:text="${inspection.inspectorName != null and !inspection.inspectorName.isBlank() ? inspection.inspectorName : '-'}">-</td>
                    <td>
                        <a th:href="@{/admin/inspections/{id}/report(id=${inspection.id})}"
                           th:class="${inspection.status != null and inspection.status.name() == 'REPORT_SUBMITTED' ? 'view-report-btn' : 'status-update-btn'}"
                           th:text="${inspection.status != null and inspection.status.name() == 'REPORT_SUBMITTED' ? 'View Report' : 'Submit Report'}">
                            Submit Report
                        </a>

                        <form th:action="@{/admin/inspections/{id}/delete(id=${inspection.id})}"
                              method="post"
                              class="delete-order-form"
                              onsubmit="return confirm('Are you sure you want to delete this inspection request?');">
                            <button type="submit" class="delete-order-btn">Delete</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

    </section>
</main>

<div th:insert="~{fragments/common/footer :: footer}"></div>

</body>
</html>
