<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Purchase Scaffold | Shrooms</title>
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" th:href="@{/css/purchase.css}">
</head>
<body>

<div th:insert="~{fragments/common/header :: header}"></div>

<main class="purchase-form-page">
    <section class="purchase-form-card">

        <h1 th:text="'Purchase ' + ${scaffold.name}">Purchase Scaffold</h1>
        <div class="red-line"></div>

        <img class="selected-scaffold-img"
             th:src="${scaffold.imageUrl}"
             th:alt="${scaffold.name}">

        <p class="selected-description"
           th:text="${scaffold.description}">
            Scaffold description
        </p>

        <div class="selected-info">
            <span th:text="'Height: ' + ${scaffold.height} + ' m'"></span>
            <span th:text="'Length: ' + ${scaffold.length} + ' m'"></span>
            <span th:text="'Width: ' + ${scaffold.width} + ' m'"></span>
            <span th:text="'Material: ' + ${scaffold.materialType}"></span>
            <span th:text="'Price: €' + ${scaffold.priceForSale}"></span>
        </div>

        <form th:action="@{/scaffolds/purchase/{id}(id=${scaffold.id})}"
              th:method="post"
              th:object="${purchaseOrderRequest}">

            <div class="form-group">
                <label for="quantity">Quantity</label>
                <input id="quantity"
                       type="number"
                       min="1"
                       th:field="*{quantity}"
                       placeholder="Enter quantity">
                <small class="error-message"
                       th:if="${#fields.hasErrors('quantity')}"
                       th:errors="*{quantity}">
                </small>
            </div>


            <div class="form-group">
                <label for="address">Delivery Address</label>
                <input id="address"
                       type="text"
                       th:field="*{address}"
                       placeholder="Enter delivery address">
                <small class="error-message"
                       th:if="${#fields.hasErrors('address')}"
                       th:errors="*{address}">
                </small>
            </div>

            <div class="form-group">
                <label for="phone">Contact Phone</label>
                <input id="phone"
                       type="text"
                       th:field="*{contactPhone}"
                       placeholder="Enter contact phone">
                <small class="error-message"
                       th:if="${#fields.hasErrors('contactPhone')}"
                       th:errors="*{contactPhone}">
                </small>
            </div>

            <label class="checkbox-row">
                <input type="checkbox" th:field="*{installationRequired}">
                Installation required (included in the price)
            </label>
            <small class="error-message"
                   th:if="${orderError}"
                   th:text="${orderError}">
            </small>
            <p class="error-message"
               th:if="${accountClosurePending}">
                You cannot place new orders because you requested account closure.
            </p>
            <p class="payment-note">
                Payment is made on delivery after your order is approved.
            </p>
            <button th:if="${!accountClosurePending}"
                    type="submit"
                    class="submit-btn">
                Submit Purchase Order
            </button>
            <button th:if="${accountClosurePending}"
                    type="button"
                    class="submit-btn disabled-btn"
                    disabled>
                Account closure pending
            </button>
        </form>

        <a th:href="@{/scaffolds/purchase}" class="back-link">
            Back to Purchase Options
        </a>

    </section>
</main>

<div th:insert="~{fragments/common/footer :: footer}"></div>

</body>
</html>
