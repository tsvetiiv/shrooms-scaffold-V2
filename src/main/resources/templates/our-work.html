<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Our Work | Shrooms</title>
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/our-work.css">
</head>
<body>

<div th:insert="~{fragments/common/header :: header}"></div>

<main class="our-work-page">

    <section class="page-title">
        <h1>Our Work</h1>
        <div class="red-line"></div>
        <p>Real scaffold projects for renovation, construction and custom access solutions.</p>
    </section>

    <section class="gallery">
        <div class="work-card" th:each="project : ${projects}">
            <img th:src="${project.imageUrl}"
                 th:alt="${project.title}">
            <h2 th:text="${project.title}">Project title</h2>
            <p th:text="${project.description}">
                Project description
            </p>
        </div>
    </section>
</main>

<div th:insert="~{fragments/common/footer :: footer}"></div>

</body>
</html>
